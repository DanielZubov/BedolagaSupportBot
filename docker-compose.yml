services:
  support-bot:
    build: .
    container_name: remnawave_support_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-remnawave_bot}
      POSTGRES_USER: ${POSTGRES_USER:-remnawave_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      REDIS_URL: redis://redis:6379/1
      TZ: Europe/Moscow
    volumes:
      - ./logs:/app/logs:rw
      - ./data:/app/data:rw
    networks:
      - bot_network
    # Убираем depends_on, так как контейнеры уже запущены отдельно

networks:
  bot_network:
    external: true
    name: remnawave-bedolaga-telegram-bot_bot_network  # Используем сеть от Bedolaga
